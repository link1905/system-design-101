baseURL: https://example.org/
languageCode: en-us
title: System Design 101
theme: hextra

enableRobotsTXT: true
# Parse Git commit
enableGitInfo: true
enableEmoji: true

menu:
  main:
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/imfing/hextra"
      params:
        icon: github
    - name: Author
      weight: 6
      url: "https://github.com/imfing/hextra"
      params:
        icon: developer

# services:
#   googleAnalytics:
#     ID: G-MEASUREMENT_ID

defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1
    title: Hextra
    
markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

enableInlineShortcodes: true

params:
  description: Modern, responsive, batteries-included Hugo theme for creating beautiful static websites.

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      # width: 40
      # height: 20
      # link: /
    width: wide

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: normal

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    enable: false

  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Search
  search:
    enable: true
    type: flexsearch

    flexsearch:
      index: content
      tokenize: forward

  editURL:
    enable: true
    base: "https://github.com/link1905/system-design-101/edit/main"

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: link1905/system-design-101
      repoId: R_kgDOOVgBXw
      category: Announcements
      categoryId: DIC_kwDOOVgBX84CpBzM
      mapping: pathname
      strict: 0
      reactionsEnabled: 1
      inputPosition: bottom
      lang: en